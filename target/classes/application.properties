# Standard Spring Boot Mail SMTP Configuration
# Natively dispatch emails over the internet directly to customers' real inboxes

spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Replace the username below with your actual sender Gmail address
spring.mail.username=your-email@gmail.com
# Replace the password below with your actual Google App Password (16 characters, no spaces)
# Generate an App Password via Google Account -> Security -> 2-Step Verification -> App passwords
spring.mail.password=your-app-password-here

# Secure SMTP Transport protocols and TLS settings
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Application configuration properties
server.port=8080
spring.thymeleaf.cache=false

# Integrated SQL Database Configuration (Persistent Local File Engine)
spring.datasource.url=jdbc:h2:file:./data/carwashdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=system
spring.datasource.password=Hl@yza

# Spring Data JPA & Hibernate Engine
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Integrated Visual Web Console Access
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
